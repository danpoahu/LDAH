  <script type="text/babel">
    const { useState, useEffect } = React;

    // URL conversion function (global)
    const convertUrlsToLinks = (text) => {
      const urlRegex = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/gi;
      const parts = text.split(urlRegex).filter(Boolean);
      
      return parts.map((part, index) => {
        if (part.match(urlRegex)) {
          let href = part;
          if (part.startsWith('www.')) {
            href = 'https://' + part;
          }
          return <a key={index} href={href} target="_blank" rel="noopener noreferrer" style={{color: '#0066a1', textDecoration: 'underline'}}>{part}</a>;
        }
        return part;
      });
    };

    // ── Recurring-event helpers (field names match CMS: frequency, numeric dayOfWeek, weekOfMonth)
    const fmt12 = (time24) => {
      if (!time24) return '';
      const [h, m] = time24.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hour = h % 12 || 12;
      return `${hour}:${String(m).padStart(2,'0')} ${ampm}`;
    };

    const getOccurrencesInNext30Days = (schedules) => {
      const today = new Date(); today.setHours(0,0,0,0);
      const end = new Date(today); end.setDate(end.getDate() + 30);
      const results = [];
      (schedules || []).forEach(sch => {
        if (sch.frequency === 'weekly') {
          let d = new Date(today);
          const diff = (sch.dayOfWeek - d.getDay() + 7) % 7;
          d.setDate(d.getDate() + diff);
          while (d <= end) {
            results.push({ date: new Date(d), schedule: sch });
            d.setDate(d.getDate() + 7);
          }
        } else { // monthly
          for (let mo = 0; mo <= 2; mo++) {
            const ref = new Date(today.getFullYear(), today.getMonth() + mo, 1);
            const firstDow = ref.getDay();
            const dayOffset = (sch.dayOfWeek - firstDow + 7) % 7;
            const nth = new Date(ref.getFullYear(), ref.getMonth(),
                                 1 + dayOffset + (sch.weekOfMonth - 1) * 7);
            if (nth.getMonth() === ref.getMonth() && nth >= today && nth <= end)
              results.push({ date: nth, schedule: sch });
          }
        }
      });
      results.sort((a, b) => a.date - b.date);
      return results;
    };

    const formatOccurrence = (occ) => {
      const d = occ.date;
      const label = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
      const venue = occ.schedule.venue ? ` \u2013 ${occ.schedule.venue}` : '';
      const timeRange = `${fmt12(occ.schedule.startTime)} \u2013 ${fmt12(occ.schedule.endTime)}`;
      const key = `${d.toISOString().slice(0,10)}|${occ.schedule.location}${venue}|${timeRange}`;
      const display = `${label} \u00b7 ${occ.schedule.location}${venue} \u00b7 ${timeRange}`;
      return { key, display };
    };
    // ────────────────────────────────────────────────────────────────────────

    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyAU3CQ07bCVKlJ1qGak-150kaJEyPKldLk",
      authDomain: "ldah-932d5.firebaseapp.com",

      storageBucket: "ldah-932d5.firebasestorage.app",

    };

    if (!firebase.apps.length) {

    const db = firebase.firestore();

    // Track page view

    // Mirror of LDAH_W2 parseSignupDateString — converts a free-form signup
    // date label (e.g. "October 11, 2025" or "October 11th") into YYYY-MM-DD,
    // so we can detect expired dates on the signup modal.
    function parseSignupDateString(dateStr) {
      if (!dateStr) return null;
      const months = {
        january:0,february:1,march:2,april:3,may:4,june:5,
        july:6,august:7,september:8,october:9,november:10,december:11
      };
      const now = new Date();
      const currentYear = now.getFullYear();
      const currentMonth = now.getMonth();
      const monthDayMatch = dateStr.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december)\s+(\d{1,2})(?:st|nd|rd|th)?\b/i);
      if (monthDayMatch) {
        const monthNum = months[monthDayMatch[1].toLowerCase()];
        const day = parseInt(monthDayMatch[2], 10);
        if (monthNum !== undefined && day >= 1 && day <= 31) {
          const yearMatch = dateStr.match(/\b(20\d{2})\b/);
          let year = yearMatch ? parseInt(yearMatch[1],10) : (monthNum < currentMonth ? currentYear + 1 : currentYear);
          return `${year}-${String(monthNum+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        }
      }
      try {
        const clean = dateStr.replace(/^[A-Za-z']+[.,]\s*/i,'').replace(/\d{1,2}(?:am|pm)\s*-\s*\d{1,2}(?:am|pm)/i,'').replace(/\*\*.*?\*\*/g,'').trim();
        const parsed = new Date(clean);
        if (!isNaN(parsed.getTime())) {
          return `${parsed.getFullYear()}-${String(parsed.getMonth()+1).padStart(2,'0')}-${String(parsed.getDate()).padStart(2,'0')}`;
        }
      } catch(_) {}
      return null;
    }

    function isSignupDateExpired(dateStr) {
      const iso = parseSignupDateString(dateStr);
      if (!iso) return false;
      return new Date(iso + 'T23:59:59') < new Date();
    }

    const EventsApp = () => {
      const [events, setEvents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isPastEvents, setIsPastEvents] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      const [showSignupModal, setShowSignupModal] = useState(false);
      const [signupEvent, setSignupEvent] = useState(null);
      const [formData, setFormData] = useState({
        name: '',
        email: '',
        phone: '',
        preferredContact: '',
        participationType: '',
        groupName: '',
        groupSize: '',
        selectedDates: [],
        customAnswers: {},
        additionalComments: ''
      });
      const [submitting, setSubmitting] = useState(false);
      const [submitSuccess, setSubmitSuccess] = useState(false);
      const [lastSignupDocId, setLastSignupDocId] = useState(null);
      const [lastSignupEventId, setLastSignupEventId] = useState(null);
      const [lastSignupType, setLastSignupType] = useState(null); // 'event' or 'recurring'

      // Recurring-event state
      const [recurringPrograms, setRecurringPrograms] = useState([]);
      const [showRecurringModal, setShowRecurringModal] = useState(false);
      const [recurringSignupEvent, setRecurringSignupEvent] = useState(null);
      const [recurringFormData, setRecurringFormData] = useState({
        name: '', email: '', phone: '', preferredContact: '',
        registrantType: '',
        studentName: '', dob: '', studentId: '', grade: '',
        currentSchool: '', iepReviewDate: '', reevDate: '', careCoordinator: '',
        participationType: 'Individual', groupName: '', groupSize: '',
        selectedSessions: [], additionalComments: ''
      });
      const [recurringSubmitting, setRecurringSubmitting] = useState(false);
      const [recurringSubmitSuccess, setRecurringSubmitSuccess] = useState(false);
      const [recurringLastSignupDocId, setRecurringLastSignupDocId] = useState(null);
      const [sessionConfirmedCounts, setSessionConfirmedCounts] = useState({});
      const RECURRING_SESSION_CAPACITY = 3;

      // Registration modal state
      const [showRegistrationModal, setShowRegistrationModal] = useState(false);
      const [regToken, setRegToken] = useState(null);
      const [regEventId, setRegEventId] = useState(null);
      const [regType, setRegType] = useState(null); // 'event' or 'recurring'
      const [regPrefillData, setRegPrefillData] = useState(null);
      const [regLoading, setRegLoading] = useState(false);
      const [regSubmitting, setRegSubmitting] = useState(false);
      const [regSuccess, setRegSuccess] = useState(false);
      const [regAlreadyCompleted, setRegAlreadyCompleted] = useState(false);
      const [regError, setRegError] = useState(null);
      const [regRegistrantName, setRegRegistrantName] = useState('');
      const [regSignupInfo, setRegSignupInfo] = useState(null); // {name, email, phone}
      const [regLastRegistration, setRegLastRegistration] = useState(null);
      const [regFormData, setRegFormData] = useState({
        streetAddress: '', city: '', zipCode: '',
        role: '', reasonForAttending: '',
        militaryStatus: '', militaryBranch: '',
        childAgeRange: '', childGender: '', ethnicity: '',
        disabilityCategories: [],
        priorTraining: '', priorTrainingDate: '',
        howHeard: '', howHeardOther: '', accommodations: ''
      });
      const [regDisabilityError, setRegDisabilityError] = useState(false);
      // Sibling-signup prompt state
      const [regSiblings, setRegSiblings] = useState([]); // [{collection, eventId, signupId, eventTitle, sessionDate}]
      const [regSiblingChecked, setRegSiblingChecked] = useState({});
      const [regSiblingApplying, setRegSiblingApplying] = useState(false);
      const [regSiblingApplied, setRegSiblingApplied] = useState(0); // >0 means applied to N
      const [regSiblingDismissed, setRegSiblingDismissed] = useState(false);

      // ── Registration modal helpers ──────────────────────────────────────
      const openRegistration = async (token, eventId, type, prefill) => {
        setRegToken(token);
        setRegEventId(eventId);
        setRegType(type);
        setRegPrefillData(prefill || null);
        setRegSuccess(false);
        setRegAlreadyCompleted(false);
        setRegError(null);
        setRegDisabilityError(false);
        setRegSubmitting(false);
        setRegSiblings([]);
        setRegSiblingChecked({});
        setRegSiblingApplied(0);
        setRegSiblingDismissed(false);
        setShowRegistrationModal(true);
        setRegLoading(true);

        // Reset form with optional prefill
        const pf = prefill || {};
        setRegFormData({
          streetAddress: pf.streetAddress || '',
          city: pf.city || '',
          zipCode: pf.zipCode || '',
          role: pf.role || '',
          reasonForAttending: pf.reasonForAttending || '',
          militaryStatus: pf.militaryStatus || '',
          militaryBranch: pf.militaryBranch || '',
          childAgeRange: '',
          childGender: '',
          ethnicity: '',
          disabilityCategories: [],
          priorTraining: pf.priorTraining || '',
          priorTrainingDate: pf.priorTrainingDate || '',
          howHeard: pf.howHeard || '',
          howHeardOther: pf.howHeardOther || '',
          accommodations: pf.accommodations || ''
        });

        // Fetch signup doc
        try {
          const collectionName = type === 'recurring' ? 'recurringEvents' : 'events';
          const doc = await db.collection(collectionName).doc(eventId).collection('signups').doc(token).get();
          if (!doc.exists) {
            setRegError('Registration not found. Please check your link and try again.');
            setRegLoading(false);
            return;
          }
          const data = doc.data();
          setRegSignupInfo({ name: data.name || '', email: data.email || '', phone: data.phone || '' });
          setRegRegistrantName(data.name || 'Attendee');

          if (data.status === 'confirmed') {
            setRegAlreadyCompleted(true);
          }
        } catch (err) {
          console.error('Error loading registration:', err);
          setRegError('Error loading registration. Please try again later.');
        } finally {
          setRegLoading(false);
        }
      };

      const handleRegFormChange = (field, value) => {
        setRegFormData(prev => ({ ...prev, [field]: value }));
      };

      const handleDisabilityToggle = (dis) => {
        setRegFormData(prev => ({
          ...prev,
          disabilityCategories: prev.disabilityCategories.includes(dis)
            ? prev.disabilityCategories.filter(d => d !== dis)
            : [...prev.disabilityCategories, dis]
        }));
        setRegDisabilityError(false);
      };

      const handleRegSubmit = async (e) => {
        e.preventDefault();
        // Validate disability checkboxes (Parent/Guardian only)
        if (regFormData.role === 'Parent/Guardian' && regFormData.disabilityCategories.length === 0) {
          setRegDisabilityError(true);
          return;
        }
        setRegSubmitting(true);
        try {
          const collectionName = regType === 'recurring' ? 'recurringEvents' : 'events';
          const registration = { ...regFormData };
          // Sanitize child/military fields for non-parent registrants
          if (registration.role !== 'Parent/Guardian') {
            registration.militaryStatus = '';
            registration.militaryBranch = '';
            registration.childAgeRange = '';
            registration.childGender = '';
            registration.ethnicity = '';
            registration.disabilityCategories = [];
          }
          await db.collection(collectionName).doc(regEventId).collection('signups').doc(regToken).update({
            registration: registration,
            registrantType: registration.role || '',
            status: 'confirmed',
            registrationCompletedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          setRegLastRegistration({ ...regFormData });
          setRegSuccess(true);
          // Kick off sibling-signup lookup (non-blocking)
          (async () => {
            try {
              const resp = await fetch('https://us-central1-ldah-932d5.cloudfunctions.net/findSiblingPendingSignups', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection: collectionName, eventId: regEventId, signupId: regToken })
              });
              if (!resp.ok) return;
              const data = await resp.json();
              const siblings = (data && data.siblings) || [];
              if (!siblings.length) return;
              const initChecked = {};
              siblings.forEach((_, i) => { initChecked[i] = true; });
              setRegSiblings(siblings);
              setRegSiblingChecked(initChecked);
            } catch (e) { console.warn('Sibling signup check skipped:', e.message); }
          })();
        } catch (err) {
          console.error('Error submitting registration:', err);
          setRegError('There was an error submitting your registration. Please try again later.');
        } finally {
          setRegSubmitting(false);
        }
      };

      const handleApplySiblings = async () => {
        const reg = regLastRegistration;
        if (!reg || !regSiblings.length) return;
        const indices = Object.keys(regSiblingChecked).filter(k => regSiblingChecked[k]).map(Number);
        if (!indices.length) { setRegSiblingDismissed(true); return; }
        setRegSiblingApplying(true);
        try {
          const writes = indices.map(i => {
            const s = regSiblings[i];
            return db.collection(s.collection).doc(s.eventId).collection('signups').doc(s.signupId).update({
              registration: reg,
              registrantType: reg.role || '',
              status: 'confirmed',
              registrationCompletedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
          });
          await Promise.all(writes);
          setRegSiblingApplied(indices.length);
        } catch (err) {
          console.error('Error applying to siblings:', err);
          setRegSiblingApplied(-1);
        } finally {
          setRegSiblingApplying(false);
        }
      };

      const handleRegisterAnotherChild = async () => {
        if (!regSignupInfo || !regEventId || !regType) return;
        setRegLoading(true);
        try {
          const collectionName = regType === 'recurring' ? 'recurringEvents' : 'events';
          const newDocRef = await db.collection(collectionName).doc(regEventId).collection('signups').add({
            name: regSignupInfo.name || '',
            email: regSignupInfo.email || '',
            phone: regSignupInfo.phone || '',
            status: 'pending',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
          });
          // Update denormalized counts
          try {
            await db.collection(collectionName).doc(regEventId).update({
              signupCount: firebase.firestore.FieldValue.increment(1),
              pendingCount: firebase.firestore.FieldValue.increment(1)
            });
          } catch (countErr) {
            console.warn('Count update deferred:', countErr.message);
          }
          // Open registration with prefilled family data
          openRegistration(newDocRef.id, regEventId, regType, regLastRegistration);
        } catch (err) {
          console.error('Error creating sibling signup:', err);
          setRegError('There was an error. Please try again.');
          setRegLoading(false);
        }
      };

      // Auto-open registration from URL params (email links)
      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const eventId = urlParams.get('eventId');
        const type = urlParams.get('type');
        if (token && eventId && type) {
          // Small delay to ensure Firebase is ready
          const timer = setTimeout(() => {
            openRegistration(token, eventId, type);
          }, 500);
          return () => clearTimeout(timer);
        }
      }, []);
      // ──────────────────────────────────────────────────────────────────────

      useEffect(() => {
        const load = async () => {
          try {
            const [eventsSnap, recurringSnap] = await Promise.all([
              db.collection('events').get(),
              db.collection('recurringEvents').get()   // fetch all, filter active client-side
            ]);
            const allRecurring = recurringSnap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            console.log('📊 Events:', eventsSnap.size, '| Recurring docs:', recurringSnap.size, allRecurring);
            setEvents(eventsSnap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            // filter active client-side so a missing/false field doesn't silently hide programs
            setRecurringPrograms(allRecurring.filter(p => p.active !== false));
          } catch (error) {
            console.error('Error loading events:', error);
          } finally {
            setLoading(false);
          }
        };
        load();
      }, []);

      const formatDate = (dateString) => {
        if (!dateString) return '';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-US', { 
          month: 'long', 
          day: 'numeric', 
          year: 'numeric' 
        });
      };

      const isEventCurrent = (event) => {
        const now = new Date();
        const startDate = new Date(event.startDate + 'T00:00:00');
        const moveToPastDate = new Date(event.moveToPastDate + 'T00:00:00');
        return now >= startDate && now < moveToPastDate;
      };

      const isEventPast = (event) => {
        const now = new Date();
        const moveToPastDate = new Date(event.moveToPastDate + 'T00:00:00');
        const removeDate = new Date(event.removeDate + 'T00:00:00');
        return now >= moveToPastDate && now < removeDate;
      };

      // Build virtual recurring cards — those with upcoming occurrences or flyer-only
      const recurringVirtualEvents = recurringPrograms
        .map(prog => {
          if (prog.flyerOnly) {
            return { ...prog, _isRecurring: true, _isFlyerOnly: true,
                     _nextDate: new Date(), _nextLabel: 'Informational' };
          }
          const occ = getOccurrencesInNext30Days(prog.schedules || []);
          if (!occ.length) return null;
          const { display } = formatOccurrence(occ[0]);
          return { ...prog, _isRecurring: true, _nextDate: occ[0].date,
                   _nextLabel: display, _occurrences: occ };
        })
        .filter(Boolean)
        .sort((a, b) => a._nextDate - b._nextDate);

      const regularCurrent = events.filter(isEventCurrent)
        .sort((a, b) => new Date(a.startDate) - new Date(b.startDate));

      const _mergedCurrent = [...recurringVirtualEvents, ...regularCurrent];
      const _acceptsSignups = (ev) => {
        if (!ev) return false;
        if (ev._isFlyerOnly || ev.isFlyerOnly) return false;
        if (ev._isRecurring || ev.isRecurring) return true;
        return !!(ev.signupDates && ev.signupDates.length > 0);
      };

        const allDates = event.signupDates || [];
        const availableDates = allDates.filter(d => !isSignupDateExpired(d));
        const preselected = availableDates.length === 1 ? [availableDates[0]] : [];

        setSignupEvent(event);
        setShowSignupModal(true);
        setFormData({
          name: '',
          email: '',
          phone: '',
          preferredContact: '',
          participationType: '',
          groupName: '',
          groupSize: '',
          selectedDates: preselected,
          customAnswers: {},
          additionalComments: ''

        setSubmitSuccess(false);

      const handleFormChange = (field, value) => {
        setFormData(prev => ({ ...prev, [field]: value }));

      const formatPhoneNumber = (value) => {
        // Remove all non-digits
        const digits = value.replace(/\D/g, '');
        
        // Limit to 10 digits
        const limited = digits.slice(0, 10);
        
        // Format as (XXX) XXX-XXXX
        if (limited.length <= 3) {
          return limited;
        } else if (limited.length <= 6) {
          return `(${limited.slice(0, 3)}) ${limited.slice(3)}`;
        } else {
          return `(${limited.slice(0, 3)}) ${limited.slice(3, 6)}-${limited.slice(6)}`;
        }
      };

        try {

          const signupsSnap = await db.collection('recurringEvents').doc(prog.id).collection('signups').get();
          signupsSnap.docs.forEach(doc => {
            const s = doc.data();

                          value={recurringFormData.studentName}

                        />

                        <label style={{ display: 'block', color: '#0D7A7A', fontWeight: 'bold', marginBottom: '6px', fontSize: '13px' }}>

                        </label>
                        <input type="date" required
                          value={recurringFormData.dob}
                          onChange={(e) => handleRecurringFormChange('dob', e.target.value)}

                        />

                        </label>

                          value={recurringFormData.studentId}
                          onChange={(e) => handleRecurringFormChange('studentId', e.target.value)}

                          style={{ width: '100%', padding: '10px', border: '1px solid #0D7A7A', borderRadius: '8px', fontSize: '14px', opacity: recurringSubmitting ? 0.6 : 1 }}

                        </label>
                        <input type="text" required
                          value={recurringFormData.grade}

                          disabled={recurringSubmitting} placeholder="e.g. 3rd, 8th, 12th"

                          Current School *
                        </label>
                        <input type="text" required
                          value={recurringFormData.currentSchool}
                          onChange={(e) => handleRecurringFormChange('currentSchool', e.target.value)}

                          style={{ width: '100%', padding: '10px', border: '1px solid #0D7A7A', borderRadius: '8px', fontSize: '14px', opacity: recurringSubmitting ? 0.6 : 1 }}

                      </div>

                          <label key={i} style={{
                            display: 'flex', alignItems: 'flex-start', gap: '8px',
                            padding: '10px 12px', marginBottom: '8px', borderRadius: '8px',
                            background: isFull ? '#fee2e2' : '#f0f9ff',
                            border: `1px solid ${isFull ? '#fecaca' : '#e0f2fe'}`,
                            cursor: isFull || recurringSubmitting ? 'not-allowed' : 'pointer',
                            opacity: isFull ? 0.6 : 1

                            <input
                              type="checkbox"
                              checked={recurringFormData.selectedSessions.includes(key)}
                              onChange={() => handleSessionToggle(key)}
                              disabled={recurringSubmitting || isFull}
                              style={{ width: '18px', height: '18px', marginTop: '2px', flexShrink: 0, cursor: isFull ? 'not-allowed' : 'pointer' }}

                            <span style={{ fontSize: '14px', color: isFull ? '#991b1b' : '#374151', lineHeight: '1.5' }}>

                          width: '100%', padding: '12px', border: '1px solid #D1D5DB',

                        style={{

                          border: '2px solid #0D7A7A', borderRadius: '8px', fontSize: '14px',
                          fontWeight: 'bold', cursor: recurringSubmitting ? 'not-allowed' : 'pointer',
                          opacity: recurringSubmitting ? 0.5 : 1, transition: 'all 0.2s'

                      <button

                          fontSize: '14px', fontWeight: 'bold', transition: 'all 0.2s',
                          cursor: (recurringSubmitting || recurringFormData.selectedSessions.length === 0) ? 'not-allowed' : 'pointer'
                        }}

                        {recurringSubmitting ? 'Submitting...' : 'Submit'}
                      </button>
                    </div>
                  </form>

            <div
              onClick={() => !regSubmitting && !regLoading && setShowRegistrationModal(false)}
              style={{
                position: 'fixed', top: 0, left: 0, width: '100%', height: '100%',

                  onClick={() => !regSubmitting && !regLoading && setShowRegistrationModal(false)}
                  disabled={regSubmitting || regLoading}

                    position: 'absolute', top: '16px', right: '16px',
                    backgroundColor: 'transparent', border: 'none', color: '#004E7C',

                    opacity: (regSubmitting || regLoading) ? 0.5 : 1, padding: '8px', fontSize: '24px'

                              style={{ width: '100%', padding: '10px', border: '1px solid #D1D5DB', borderRadius: '8px', fontSize: '14px', opacity: regSubmitting ? 0.6 : 1 }} />
